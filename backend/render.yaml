services:
  - type: web
    name: resume-analyzer-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_md"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
