name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/huggingface.yml'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Force push backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          # Configure Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Enter the backend directory and initialize a new git repository
          cd backend
          git init
          git add .
          git commit -m "Auto-sync from GitHub Actions"
          
          # Force push to the Hugging Face Space
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE main
