name: Keep Render Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" ${{ secrets.RENDER_API_URL }} > /dev/null
          echo "Successfully pinged Render!"
